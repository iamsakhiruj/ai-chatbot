<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <span class="header-icon" aria-hidden="true">✦</span>
      <h1 id="app-name" title="Click to rename">Nova</h1>
    </header>

    <main id="message-area" role="log" aria-live="polite">
      <!-- chat messages will be appended here -->
    </main>

    <footer>
      <form id="input-bar">
        <input
          type="text"
          id="message-input"
          name="message"
          placeholder="Type a message…"
          autocomplete="off"
          aria-label="Message"
        />
        <button type="submit" aria-label="Send message">↑</button>
      </form>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
